site: instagram
name: reply
description: Reply to a specific Instagram comment
domain: www.instagram.com

args:
  username:
    type: str
    required: true
    positional: true
    description: Username of the post author
  comment-id:
    type: str
    required: true
    positional: true
    description: Comment ID (pk from get-comments output)
  text:
    type: str
    required: true
    positional: true
    description: Reply text
  index:
    type: int
    default: 1
    description: Post index (1 = most recent)

pipeline:
  - navigate: https://www.instagram.com

  - evaluate: |
      (async () => {
        const username = ${{ args.username | json }};
        const commentId = ${{ args['comment-id'] | json }};
        const replyText = ${{ args.text | json }};
        const idx = ${{ args.index }} - 1;
        const headers = { 'X-IG-App-ID': '936619743392459' };
        const opts = { credentials: 'include', headers };

        // Get user ID
        const r1 = await fetch('https://www.instagram.com/api/v1/users/web_profile_info/?username=' + encodeURIComponent(username), opts);
        if (!r1.ok) throw new Error('User not found: ' + username);
        const userId = (await r1.json())?.data?.user?.id;

        // Get user's posts
        const r2 = await fetch('https://www.instagram.com/api/v1/feed/user/' + userId + '/?count=' + (idx + 1), opts);
        const posts = (await r2.json())?.items || [];
        if (idx >= posts.length) throw new Error('Post index ' + (idx + 1) + ' not found');
        const mediaPk = posts[idx].pk;

        // Get CSRF token
        const csrf = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';

        // Post reply with replied_to_comment_id
        const resp = await fetch('https://www.instagram.com/api/v1/web/comments/' + mediaPk + '/add/', {
          method: 'POST',
          credentials: 'include',
          headers: {
            ...headers,
            'X-CSRFToken': csrf,
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: 'comment_text=' + encodeURIComponent(replyText) + '&replied_to_comment_id=' + encodeURIComponent(commentId),
        });

        if (!resp.ok) throw new Error('Failed to reply: HTTP ' + resp.status);
        return [{ status: 'success', message: 'Reply posted', comment_id: commentId, text: replyText }];
      })()

columns: [status, message, comment_id, text]
