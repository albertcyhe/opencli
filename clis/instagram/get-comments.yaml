site: instagram
name: get-comments
description: Get comments on an Instagram post with reply-able IDs
domain: www.instagram.com

args:
  username:
    type: str
    required: true
    positional: true
    description: Username of the post author
  index:
    type: int
    default: 1
    description: Post index (1 = most recent)
  limit:
    type: int
    default: 20
    description: Number of comments to return

pipeline:
  - navigate: https://www.instagram.com

  - evaluate: |
      (async () => {
        const username = ${{ args.username | json }};
        const idx = ${{ args.index }} - 1;
        const limit = ${{ args.limit }};
        const headers = { 'X-IG-App-ID': '936619743392459' };
        const opts = { credentials: 'include', headers };

        // Get user ID
        const r1 = await fetch('https://www.instagram.com/api/v1/users/web_profile_info/?username=' + encodeURIComponent(username), opts);
        if (!r1.ok) throw new Error('User not found: ' + username + ' (HTTP ' + r1.status + ')');
        const userId = (await r1.json())?.data?.user?.id;
        if (!userId) throw new Error('User ID not found for ' + username);

        // Get user's posts to find the media pk
        const r2 = await fetch('https://www.instagram.com/api/v1/feed/user/' + userId + '/?count=' + (idx + 1), opts);
        if (!r2.ok) throw new Error('Failed to get user feed: HTTP ' + r2.status);
        const posts = (await r2.json())?.items || [];
        if (idx >= posts.length) throw new Error('Post index ' + (idx + 1) + ' not found (user has ' + posts.length + ' posts)');
        const mediaPk = posts[idx].pk;

        // Fetch comments
        const r3 = await fetch('https://www.instagram.com/api/v1/media/' + mediaPk + '/comments/?can_support_threading=true&count=' + Math.min(limit, 50), opts);
        if (!r3.ok) throw new Error('Failed to get comments: HTTP ' + r3.status);
        const commentsData = await r3.json();
        const comments = commentsData.comments || [];

        return comments.slice(0, limit).map(function(c, i) {
          return {
            rank: i + 1,
            comment_id: String(c.pk),
            author: c.user?.username || '',
            text: (c.text || '').substring(0, 300),
            likes: c.comment_like_count || 0,
            replies_count: c.child_comment_count || 0,
            time: c.created_at ? new Date(c.created_at * 1000).toISOString().replace('T', ' ').substring(0, 19) : '',
          };
        });
      })()

columns: [rank, comment_id, author, text, likes, replies_count, time]
