site: tiktok
name: get-comments
description: Get comments on a TikTok video with reply-able IDs
domain: www.tiktok.com

args:
  url:
    type: str
    required: true
    positional: true
    description: TikTok video URL
  limit:
    type: int
    default: 20
    description: Number of comments to return

pipeline:
  - navigate:
      url: https://www.tiktok.com/explore
      settleMs: 5000

  - evaluate: |
      (async () => {
        const videoUrl = ${{ args.url | json }};
        const limit = ${{ args.limit }};

        // Extract video ID from URL
        const idMatch = videoUrl.match(/\/video\/(\d+)/);
        if (!idMatch) throw new Error('Invalid TikTok video URL — expected /video/<id>');
        const videoId = idMatch[1];

        const res = await fetch('/api/comment/list/?aweme_id=' + videoId + '&cursor=0&count=' + Math.min(limit, 50) + '&aid=1988', { credentials: 'include' });
        if (!res.ok) throw new Error('Comment API failed: HTTP ' + res.status);
        const data = await res.json();
        const comments = data.comments || [];

        return comments.slice(0, limit).map(function(c, i) {
          return {
            rank: i + 1,
            comment_id: c.cid || '',
            author: c.user?.unique_id || c.user?.nickname || '',
            text: (c.text || '').substring(0, 300),
            likes: c.digg_count || 0,
            replies_count: c.reply_comment_total || 0,
            time: c.create_time ? new Date(c.create_time * 1000).toISOString().replace('T', ' ').substring(0, 19) : '',
          };
        });
      })()

columns: [rank, comment_id, author, text, likes, replies_count, time]
